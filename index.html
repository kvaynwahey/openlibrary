<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library Archive</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/themes.css">
    
    <style>
        :root {
            /* Dynamic font variable so JS can change it */
            --font-family: "Courier New", Courier, monospace;
        }

        body {
            background: var(--bg); color: var(--text);
            font-family: var(--font-family);
            margin: 20px auto; max-width: 1100px; padding: 20px;
            line-height: 1.6; transition: background 0.3s, color 0.3s;
        }

        input, button, select, textarea, a, th, td {
            color: var(--text); 
            font-family: var(--font-family);
        }

        ::placeholder { color: var(--text); opacity: 0.55; }
        ::-webkit-input-placeholder { color: var(--text); opacity: 0.55; }
        ::-moz-placeholder { color: var(--text); opacity: 0.55; }
        
        .header { border-bottom: 3px solid var(--border); padding-bottom: 20px; margin-bottom: 20px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; margin-bottom: 15px; }
        h1 { margin: 0; text-transform: uppercase; letter-spacing: 2px; }

        /* Unified Settings Row for Dropdowns */
        .settings-row {
            display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 15px;
        }
        .setting-item {
            display: flex; align-items: center; gap: 8px;
        }
        .setting-item label { font-weight: bold; font-size: 0.85em; text-transform: uppercase; letter-spacing: 1px; }
        .setting-item select {
            padding: 6px 10px; border: 2px solid var(--border); background: var(--bg); color: var(--text);
            border-radius: 4px; cursor: pointer; font-size: 0.9em; font-family: inherit;
        }

        .download-section { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 2px solid var(--border); margin-bottom: 10px; flex-wrap: wrap; }
        .download-btn { padding: 8px 16px; border: 2px solid var(--border); background: var(--bg); cursor: pointer; font-size: 0.85em; font-weight: bold; transition: all 0.2s; }
        .download-btn:hover, .download-btn.selected { background: var(--hover-bg); color: var(--hover-text); }
        .download-info { font-size: 0.85em; font-style: italic; }

        #download-actions { margin-top: 10px; padding: 10px; border: 2px dashed var(--border); display: flex; flex-wrap: wrap; align-items: center; gap: 15px; }
        #download-actions button { padding: 6px 12px; border: 2px solid var(--border); background: var(--bg); cursor: pointer; font-size: 0.85em; font-weight: bold; transition: all 0.2s; }
        #download-actions button:hover { background: var(--hover-bg); color: var(--hover-text); }

        #format-selector { display: flex; align-items: center; gap: 15px; margin-left: 10px; }
        #format-selector label { display: flex; align-items: center; gap: 4px; cursor: pointer; }

        .stats { font-weight: bold; margin-top: 5px; font-size: 0.9em; }
        .search-panel { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 15px; }
        .search-panel input { padding: 10px; border: 2px solid var(--border); background: var(--bg); outline: none; flex: 1 1 200px; box-sizing: border-box; }
        .year-range { display: flex; align-items: center; gap: 10px; flex: 1 1 300px; }
        .year-range input { min-width: 80px; flex: 1; }

        .table-container { width: 100%; overflow-x: auto; margin-top: 20px; }
        table { width: 100%; min-width: 700px; border-collapse: collapse; table-layout: fixed; }
        th { text-align: left; border-bottom: 2px solid var(--border); padding: 10px; font-size: 0.8em; background: var(--bg); position: sticky; top: 0; user-select: none; color: var(--text); }
        td { padding: 10px; border-bottom: 1px solid var(--accent); font-size: 0.9em; color: var(--text); }
        
        .col-title { width: 35%; cursor: pointer; }
        .col-author { width: 30%; }
        .col-year { width: 15%; cursor: pointer; }
        .col-actions { width: 20%; text-align: left; }
        .col-title:hover, .col-year:hover { background: var(--accent); }

        .letter-divider { background: var(--hover-bg); color: var(--hover-text) !important; padding: 5px 10px; font-weight: bold; }
        .title-text { text-decoration: none; font-weight: normal; }
        .action-buttons { display: flex; gap: 6px; flex-wrap: wrap; }
        .action-btn { display: inline-block; font-size: 0.75em; padding: 4px 12px; border: 1px solid var(--border); border-radius: 3px; font-weight: bold; text-decoration: none; transition: all 0.2s; background: var(--bg); white-space: nowrap; cursor: pointer; }
        .action-btn:hover, .action-btn.selected { background: var(--hover-bg); color: var(--hover-text); }
        .action-btn.read { border-width: 2px; }

        @media (max-width: 600px) {
            .search-panel { flex-direction: column; }
            .year-range { width: 100%; }
            body { padding: 10px; }
            .header-top { flex-direction: column; align-items: flex-start; }
            .download-section { flex-direction: column; align-items: flex-start; }
            .settings-row { flex-direction: column; align-items: stretch; gap: 10px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-top">
            <h1>Digital Library Archive</h1>
        </div>

        <div class="settings-row">
            <div class="setting-item">
                <label>Theme:</label>
                <select class="theme-select-dropdown"></select>
            </div>
            
            <div class="setting-item">
                <label for="sel-font">Font:</label>
                <select id="sel-font" onchange="applyIndexFont()">
                    <option value="Georgia, serif">Georgia</option>
                    <option value="'Times New Roman', serif">Times New Roman</option>
                    <option value="'Palatino Linotype', serif">Palatino</option>
                    <option value="Arial, sans-serif">Arial</option>
                    <option value="Helvetica, sans-serif">Helvetica</option>
                    <option value="Verdana, sans-serif">Verdana</option>
                    <option value="Garamond, serif">Garamond</option>
                    <option value="'Courier New', monospace">Courier</option>
                </select>
            </div>
        </div>

        <div class="download-section">
            <button class="download-btn" id="downloadBtn" onclick="toggleDownloadMode()">Download Mode</button>
            <span class="download-info" id="downloadInfo">Click to select books for download</span>
        </div>

        <div id="download-actions" style="display: none;">
            <span>Selected: <span id="selected-count">0</span></span>
            <button id="download-selected-btn">Download Selected</button>
            <button id="clear-selection-btn">Clear</button>
            <div id="format-selector" style="display: none;">
                <label><input type="radio" name="format" value="epub" checked> EPUB</label>
                <label><input type="radio" name="format" value="rtf"> RTF</label>
                <button id="start-download-btn">Download</button>
                <button id="cancel-download-btn">Cancel</button>
            </div>
        </div>

        <div class="stats">Total Items: [<span id="book-count">0</span>]</div>
        
        <div class="search-panel">
            <input type="search" id="searchTitle" oninput="debounceSearch()" placeholder="Filter by Title...">
            <input type="search" id="searchAuthor" oninput="debounceSearch()" placeholder="Filter by Author...">
            <div class="year-range">
                <input type="text" id="yearFrom" oninput="debounceSearch()" placeholder="Year From">
                <span>—</span>
                <input type="text" id="yearTo" oninput="debounceSearch()" placeholder="Year To">
            </div>
        </div>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th class="col-title" id="th-title" onclick="sortBy('title')">TITLE</th>
                    <th class="col-author">AUTHOR/AUTHOR'S</th>
                    <th class="col-year" id="th-year" onclick="sortBy('year')">YEAR</th>
                    <th class="col-actions">ACTIONS</th>
                </tr>
            </thead>
            <tbody id="library-body">
                <tr><td colspan="4" style="text-align:center;padding:30px;font-style:italic;">Loading archive...</td></tr>
            </tbody>
        </table>
    </div>

    <script src="js/themes.js"></script>
    <script>
        let archiveData = [];
        let currentSort = '';
        let sortAscending = true;
        let searchTimeout = null;
        let downloadMode = false;
        let selectedBooks = new Set();
        const DOM = {};

        function applyIndexFont() {
            const font = document.getElementById('sel-font').value;
            document.documentElement.style.setProperty('--font-family', font);
            localStorage.setItem('archive_font', font); 
        }

        function loadIndexFont() {
            const savedFont = localStorage.getItem('archive_font') || "'Courier New', monospace";
            document.documentElement.style.setProperty('--font-family', savedFont);
            const selectEl = document.getElementById('sel-font');
            if (selectEl) selectEl.value = savedFont;
        }

        function updateSelectedCount() {
            const countSpan = document.getElementById('selected-count');
            if (countSpan) countSpan.textContent = selectedBooks.size;
            
            const info = document.getElementById('downloadInfo');
            if (downloadMode) info.textContent = `${selectedBooks.size} book(s) selected - Use Select buttons`;
            
            const downloadActions = document.getElementById('download-actions');
            if (downloadMode && downloadActions) {
                downloadActions.style.display = 'flex';
                document.getElementById('format-selector').style.display = 'none';
            } else if (downloadActions) {
                downloadActions.style.display = 'none';
            }
        }

        window.toggleDownloadMode = function() {
            downloadMode = !downloadMode;
            const btn = document.getElementById('downloadBtn');
            const info = document.getElementById('downloadInfo');
            const downloadActions = document.getElementById('download-actions');
            
            if (downloadMode) {
                btn.classList.add('selected');
                info.textContent = `${selectedBooks.size} book(s) selected - Use Select buttons`;
                downloadActions.style.display = 'flex';
                document.getElementById('format-selector').style.display = 'none';
                render(); 
            } else {
                btn.classList.remove('selected');
                info.textContent = 'Click to select books for download';
                selectedBooks.clear();
                downloadActions.style.display = 'none';
                render(); 
            }
        }

        window.toggleSelect = function(base, event) {
            if (!downloadMode) return;
            event.preventDefault();
            
            if (selectedBooks.has(base)) {
                selectedBooks.delete(base);
                event.target.classList.remove('selected');
                event.target.textContent = 'Select';
            } else {
                selectedBooks.add(base);
                event.target.classList.add('selected');
                event.target.textContent = 'Selected';
            }
            updateSelectedCount();
        }

        function clearSelection() { selectedBooks.clear(); updateSelectedCount(); render(); }
        function showFormatSelector() { if (selectedBooks.size === 0) { alert('No books selected.'); return; } document.getElementById('format-selector').style.display = 'flex'; }
        function cancelDownload() { document.getElementById('format-selector').style.display = 'none'; }

        function startDownload() {
            const format = document.querySelector('input[name="format"]:checked').value;
            const booksToDownload = Array.from(selectedBooks).map(base => archiveData.find(book => book.base === base)).filter(book => book && book[format]);

            if (booksToDownload.length === 0) { alert(`None of the selected books have ${format.toUpperCase()} format.`); return; }
            booksToDownload.forEach(book => {
                const url = `books/${encodeURIComponent(book.base + '.' + format)}`;
                const a = document.createElement('a'); a.href = url; a.download = '';
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            DOM.searchTitle = document.getElementById('searchTitle');
            DOM.searchAuthor = document.getElementById('searchAuthor');
            DOM.yearFrom = document.getElementById('yearFrom');
            DOM.yearTo = document.getElementById('yearTo');
            DOM.tbody = document.getElementById('library-body');
            DOM.countStr = document.getElementById('book-count');
            DOM.titleHeader = document.getElementById('th-title');
            DOM.yearHeader = document.getElementById('th-year');

            document.getElementById('download-selected-btn').addEventListener('click', showFormatSelector);
            document.getElementById('clear-selection-btn').addEventListener('click', clearSelection);
            document.getElementById('start-download-btn').addEventListener('click', startDownload);
            document.getElementById('cancel-download-btn').addEventListener('click', cancelDownload);
            
            // Apply saved font on page load
            loadIndexFont();
        });

        function parseYear(yearStr) {
            if (!yearStr || yearStr === 'N/A') return 999999;
            const isBC = yearStr.toUpperCase().includes('BC');
            const num = parseInt(yearStr.replace(/[^0-9]/g, ''));
            if (isNaN(num)) return 999999;
            return isBC ? -num : num;
        }

        window.debounceSearch = function() { clearTimeout(searchTimeout); searchTimeout = setTimeout(render, 300); }

        function updateHeaders() {
            DOM.titleHeader.innerText = 'TITLE'; DOM.yearHeader.innerText = 'YEAR';
            const arrow = sortAscending ? ' ▲' : ' ▼';
            if (currentSort === 'title') DOM.titleHeader.innerText = 'TITLE' + arrow;
            if (currentSort === 'year') DOM.yearHeader.innerText = 'YEAR' + arrow;
        }

        window.sortBy = function(field) {
            if (currentSort === field) sortAscending = !sortAscending;
            else { currentSort = field; sortAscending = true; }
            archiveData.sort((a, b) => {
                if (field === 'year') {
                    if (a._yNum === 999999) return 1; if (b._yNum === 999999) return -1;
                    return sortAscending ? a._yNum - b._yNum : b._yNum - a._yNum;
                }
                if (a._tUpper < b._tUpper) return sortAscending ? -1 : 1;
                if (a._tUpper > b._tUpper) return sortAscending ? 1 : -1;
                return 0;
            });
            updateHeaders(); render();
        }

        function render() {
            const titleTerm = DOM.searchTitle.value.toUpperCase();
            const authorTerm = DOM.searchAuthor.value.toUpperCase();
            const yearFromStr = DOM.yearFrom.value.trim();
            const yearToStr = DOM.yearTo.value.trim();
            const minYear = yearFromStr ? parseYear(yearFromStr) : -999999;
            const maxYear = yearToStr ? parseYear(yearToStr) : 999999;

            const isFiltering = titleTerm || authorTerm || yearFromStr || yearToStr;
            const showDividers = currentSort === 'title' && sortAscending && !isFiltering;

            let htmlRows = [], count = 0, currentLetter = '';

            archiveData.forEach(book => {
                if (!book._tUpper.includes(titleTerm)) return;
                if (!book._aUpper.includes(authorTerm)) return;
                const inYear = (!yearFromStr && !yearToStr) || (book._yNum >= minYear && book._yNum <= maxYear);
                if (!inYear) return;

                if (showDividers) {
                    const ch = book._tUpper[0];
                    if (ch !== currentLetter) { currentLetter = ch; htmlRows.push(`<tr><td colspan="4" class="letter-divider">${ch}</td></tr>`); }
                }

                const epubLink = book.epub ? `reader.html?file=${encodeURIComponent('books/' + book.base + '.epub')}` : null;
                let actionsHtml = '<div class="action-buttons">';
                
                if (epubLink) actionsHtml += `<a href="${epubLink}" class="action-btn read">Read</a>`;
                if (book.rtf) actionsHtml += `<a href="books/${encodeURIComponent(book.base + '.rtf')}" download class="action-btn">RTF</a>`;

                if (downloadMode) {
                    const isSelected = selectedBooks.has(book.base);
                    const selectedClass = isSelected ? ' selected' : '';
                    const selectText = isSelected ? 'Selected' : 'Select';
                    actionsHtml += `<a href="#" onclick="toggleSelect('${book.base}', event)" class="action-btn${selectedClass}">${selectText}</a>`;
                }
                
                actionsHtml += '</div>';

                htmlRows.push(`<tr>
                    <td><span class="title-text">${book.t}</span></td>
                    <td>${book.a}</td>
                    <td>${book.y}</td>
                    <td>${actionsHtml}</td>
                </tr>`);
                count++;
            });

            if (count === 0) htmlRows.push(`<tr><td colspan="4" style="text-align:center;padding:30px;font-style:italic;">No matches found in the archive.</td></tr>`);
            DOM.tbody.innerHTML = htmlRows.join('');
            DOM.countStr.innerText = count;
        }

        function loadData() {
            const script = document.createElement('script');
            script.src = 'data.js?v=' + Date.now();
            script.onload = () => {
                if(window.archiveData) archiveData = window.archiveData;
                archiveData.forEach(book => {
                    book._tUpper = (book.t || '').toUpperCase(); book._aUpper = (book.a || '').toUpperCase(); book._yNum = parseYear(book.y);
                });
                sortBy('title');
            };
            document.head.appendChild(script);
        }

        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js').catch(() => {});
        window.onload = loadData;
    </script>
</body>
</html>
